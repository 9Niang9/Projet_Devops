version: "3.9"

services:

  # ---------------------------------------------------------
  # Base de données relationnelle (MySQL) — partagée par les
  # 3 microservices, chacun avec sa propre base logique.
  # ---------------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: bibliotheque-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./init-db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - bibliotheque-net

  # ---------------------------------------------------------
  # Microservice Livres
  # ---------------------------------------------------------
  books-service:
    build: ./backend/livres-service
    container_name: books-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: books_db
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bibliotheque-net

  # ---------------------------------------------------------
  # Microservice Utilisateurs
  # ---------------------------------------------------------
  users-service:
    build: ./backend/utilisateurs-service
    container_name: users-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: users_db
      PORT: 3002
    ports:
      - "3002:3002"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - bibliotheque-net

  # ---------------------------------------------------------
  # Microservice Emprunts (communique avec books-service et users-service)
  # ---------------------------------------------------------
  loans-service:
    build: ./backend/emprunts-service
    container_name: loans-service
    restart: unless-stopped
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: loans_db
      PORT: 3003
      BOOKS_SERVICE_URL: http://books-service:3001
      USERS_SERVICE_URL: http://users-service:3002
    ports:
      - "3003:3003"
    depends_on:
      mysql:
        condition: service_healthy
      books-service:
        condition: service_started
      users-service:
        condition: service_started
    networks:
      - bibliotheque-net

  # ---------------------------------------------------------
  # Frontend (Nginx : fichiers statiques + reverse-proxy API)
  # ---------------------------------------------------------
  frontend:
    build: ./frontend
    container_name: frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - books-service
      - users-service
      - loans-service
    networks:
      - bibliotheque-net

networks:
  bibliotheque-net:
    driver: bridge

volumes:
  mysql-data:
